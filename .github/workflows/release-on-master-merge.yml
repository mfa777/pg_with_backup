name: Release on merged master PR

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  create-semver-tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag_version.outputs.new_tag }}
      skip_docker: ${{ steps.docker_policy.outputs.skip_docker }}

    steps:
      - name: Checkout merged master commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Detect docker publish policy
        id: docker_policy
        run: |
          commit_message="$(git log -1 --pretty=%B)"
          if grep -Eq '#skip-docker' <<<"$commit_message"; then
            echo "skip_docker=true" >> "$GITHUB_OUTPUT"
            echo "Docker image publishing disabled for this release via #skip-docker."
          else
            echo "skip_docker=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create semantic version tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: master
          RELEASE_BRANCHES: master
          DEFAULT_BUMP: patch
          BRANCH_HISTORY: compare
          TAG_PREFIX: v
          INITIAL_VERSION: 2.3.0

  build-and-push-images:
    needs: create-semver-tag
    if: needs.create-semver-tag.outputs.release_tag != ''
    uses: ./.github/workflows/build-and-push.yml
    with:
      release_tag: ${{ needs.create-semver-tag.outputs.release_tag }}
      source_ref: ${{ github.event.pull_request.merge_commit_sha }}
      skip_docker: ${{ needs.create-semver-tag.outputs.skip_docker == 'true' }}
    secrets: inherit

  publish-github-release:
    needs:
      - create-semver-tag
      - build-and-push-images
    if: needs.create-semver-tag.outputs.release_tag != '' && (needs.create-semver-tag.outputs.skip_docker == 'true' || needs.build-and-push-images.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate release asset
        id: asset
        env:
          RELEASE_TAG: ${{ needs.create-semver-tag.outputs.release_tag }}
        run: |
          release_asset="$RUNNER_TEMP/${RELEASE_TAG}.txt"
          {
            echo "Release: ${RELEASE_TAG}"
            echo "Commit: ${{ github.event.pull_request.merge_commit_sha }}"
            echo "Merged PR: #${{ github.event.pull_request.number }}"
            echo "Merged by: ${{ github.event.pull_request.merged_by.login }}"
            echo "Docker images: ${{ needs.create-semver-tag.outputs.skip_docker == 'true' && 'skipped (#skip-docker)' || 'published' }}"
          } > "$release_asset"
          echo "release_asset=$release_asset" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-semver-tag.outputs.release_tag }}
          name: ${{ needs.create-semver-tag.outputs.release_tag }}
          generate_release_notes: true
          files: |
            ${{ steps.asset.outputs.release_asset }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
