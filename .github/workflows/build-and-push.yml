name: Build and push Docker images

on:
  workflow_call:
    inputs:
      release_tag:
        description: Generated release tag used for Docker image tags
        required: true
        type: string
      source_ref:
        description: Commit SHA or ref to build from
        required: true
        type: string
      skip_docker:
        description: Skip Docker image build and push when true
        required: false
        default: false
        type: boolean

jobs:
  build-and-push:
    if: ${{ !inputs.skip_docker }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.postgres-walg
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-with-backup:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-with-backup:${{ inputs.release_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backup image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backup
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-backup-walg:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-backup-walg:${{ inputs.release_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
